name: CI/CD

on:
  push:
    branches:
      - main
      - stage
  pull_request:
    branches:
      - main
      - stage

jobs:
  test:
    name: Test (vet, lint, unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: service

      - name: go test
        run: go test ./...

  build-and-deploy:
    name: Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "ENV_NAME=prod"                       >> $GITHUB_OUTPUT
            echo "ENV_DIR=prod"                        >> $GITHUB_OUTPUT
            echo "VAR_FILE=prod/prod.tfvars"           >> $GITHUB_OUTPUT
            echo "PROJECT_ID=dfh-prod-id"              >> $GITHUB_OUTPUT
            echo "SERVICE_NAME=conway-life-prod"       >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=stage"                      >> $GITHUB_OUTPUT
            echo "ENV_DIR=stage"                       >> $GITHUB_OUTPUT
            echo "VAR_FILE=stage/stage.tfvars"         >> $GITHUB_OUTPUT
            echo "PROJECT_ID=dfh-stage-id"             >> $GITHUB_OUTPUT
            echo "SERVICE_NAME=conway-life-stage"      >> $GITHUB_OUTPUT
          fi

      # Two conditional auth steps (NOT a ternary expression — GitHub Actions
      # `A && B || C` bug causes falsy B to short-circuit to C).
      - name: Authenticate to GCP (staging)
        if: steps.env.outputs.ENV_NAME == 'stage'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_STAGE_SA_KEY }}

      - name: Authenticate to GCP (production)
        if: steps.env.outputs.ENV_NAME == 'prod'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_PROD_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Compute version
        id: version
        run: |
          BASE_VERSION=$(cat VERSION | tr -d '[:space:]')
          COMMIT_COUNT=$(git rev-list --count HEAD)
          MAJOR_MINOR=$(echo "$BASE_VERSION" | cut -d. -f1,2)
          VERSION="$MAJOR_MINOR.$COMMIT_COUNT"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Pre-deploy resource conflict check
        run: |
          set -e
          PROJECT_ID="${{ steps.env.outputs.PROJECT_ID }}"
          SERVICE_NAME="${{ steps.env.outputs.SERVICE_NAME }}"
          SA_ID="conway-life-${{ steps.env.outputs.ENV_NAME == 'prod' && 'production' || 'staging' }}"

          echo "Checking Cloud Run service: $SERVICE_NAME in $PROJECT_ID"
          gcloud run services describe "$SERVICE_NAME" \
            --region=us-central1 --project="$PROJECT_ID" --format="value(metadata.name)" 2>/dev/null \
            && SERVICE_EXISTS=1 || SERVICE_EXISTS=0

          echo "Checking Firestore database: conway-life in $PROJECT_ID"
          gcloud firestore databases describe --database=conway-life \
            --project="$PROJECT_ID" --format="value(name)" 2>/dev/null \
            && DB_EXISTS=1 || DB_EXISTS=0

          echo "Checking runtime service account: ${SA_ID}@${PROJECT_ID}.iam.gserviceaccount.com"
          gcloud iam service-accounts describe "${SA_ID}@${PROJECT_ID}.iam.gserviceaccount.com" \
            --project="$PROJECT_ID" --format="value(email)" 2>/dev/null \
            && SA_EXISTS=1 || SA_EXISTS=0

          echo "Resource state summary:"
          echo "  Cloud Run service exists: $SERVICE_EXISTS"
          echo "  Firestore DB exists:      $DB_EXISTS"
          echo "  Runtime SA exists:        $SA_EXISTS"
          echo "(Resources will be imported/updated by Terraform if already in state.)"

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/${{ steps.env.outputs.PROJECT_ID }}/conway-life:v${{ steps.version.outputs.VERSION }} \
            -t gcr.io/${{ steps.env.outputs.PROJECT_ID }}/conway-life:latest \
            -f service/Dockerfile service/

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ steps.env.outputs.PROJECT_ID }}/conway-life:v${{ steps.version.outputs.VERSION }}
          docker push gcr.io/${{ steps.env.outputs.PROJECT_ID }}/conway-life:latest

      - name: Terraform init and apply
        working-directory: terraform
        run: |
          cp ${{ steps.env.outputs.ENV_DIR }}/backend.tf backend.tf
          terraform init -input=false
          terraform validate
          terraform plan \
            -var-file="${{ steps.env.outputs.VAR_FILE }}" \
            -var="image_tag=v${{ steps.version.outputs.VERSION }}" \
            -input=false -no-color
          terraform apply \
            -var-file="${{ steps.env.outputs.VAR_FILE }}" \
            -var="image_tag=v${{ steps.version.outputs.VERSION }}" \
            -auto-approve -input=false -no-color

      - name: Get service URL
        id: get-url
        working-directory: terraform
        run: |
          SERVICE_URL=$(terraform output -raw service_url)
          CUSTOM_URL=$(terraform output -raw custom_domain_url)
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "CUSTOM_URL=$CUSTOM_URL"   >> $GITHUB_OUTPUT
          echo "Deployed:  $SERVICE_URL"
          echo "Custom:    $CUSTOM_URL"

      - name: Smoke test (/health)
        run: |
          URL="${{ steps.get-url.outputs.SERVICE_URL }}/health"
          echo "Smoke-testing: $URL"
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "$URL"; then
              echo ""
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed; retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ steps.env.outputs.ENV_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:**     ${{ steps.env.outputs.PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:**     ${{ steps.env.outputs.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:**     v${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service URL:** ${{ steps.get-url.outputs.SERVICE_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Custom URL:**  ${{ steps.get-url.outputs.CUSTOM_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:**      ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
